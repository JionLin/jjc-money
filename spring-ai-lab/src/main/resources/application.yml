# 共享配置。大模型厂商在 application-deepseek.yml / application-qwen.yml。
#
# 切换方式（任选其一）：
# - 环境变量：SPRING_PROFILES_ACTIVE=qwen,mysql,redis-vector
# - JVM 参数：--spring.profiles.active=qwen,mysql,redis-vector
# - 修改下方 spring.profiles.active 默认值
#
# DeepSeek 密钥：SPRING_AI_OPENAI_API_KEY
# 通义（DashScope）密钥：DASHSCOPE_API_KEY
# MySQL 配置：MYSQL_URL / MYSQL_USERNAME / MYSQL_PASSWORD
# Redis 配置：REDIS_HOST / REDIS_PORT / REDIS_PASSWORD
spring:
  application:
    name: server
  profiles:
    active: local






mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto



logging:
  pattern:
    level: "%5p [traceId:%X{traceId}]"

resilience4j:
  retry:
    instances:
      externalPost:
        max-attempts: 3
        wait-duration: 200ms
        retry-exceptions:
          - com.springailab.lab.external.ExternalPostException
  circuitbreaker:
    instances:
      externalPost:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s

lab:
  runtime:
    skill-path: ${LAB_RUNTIME_SKILL_PATH:../.agent/skills/jinjian-perspective/SKILL.md}
    minimum-skill-version: ${LAB_RUNTIME_MIN_SKILL_VERSION:2.0}
    fail-fast-on-skill-error: ${LAB_RUNTIME_FAIL_FAST:true}
    overview-narrowing-enabled: ${LAB_RUNTIME_OVERVIEW_NARROWING:true}
    debug-enabled: ${LAB_RUNTIME_DEBUG_ENABLED:true}
    archive-roots:
      - ${LAB_RUNTIME_ARCHIVE_ROOT_1:../22-25year}
      - ${LAB_RUNTIME_ARCHIVE_ROOT_2:../26year}
    archive-overview-path: ${LAB_RUNTIME_ARCHIVE_OVERVIEW_PATH:../docs/indexes/archive-index.md}
    derived-doc-roots:
      - ${LAB_RUNTIME_DERIVED_ROOT_1:../docs/topology-details}
      - ${LAB_RUNTIME_DERIVED_ROOT_2:../docs/deep-analysis}
    fresh-price-ttl-seconds: ${LAB_RUNTIME_FRESH_PRICE_TTL_SECONDS:180}
    fresh-valuation-ttl-seconds: ${LAB_RUNTIME_FRESH_VALUATION_TTL_SECONDS:600}
    fresh-filings-ttl-seconds: ${LAB_RUNTIME_FRESH_FILINGS_TTL_SECONDS:1800}
    fresh-macro-ttl-seconds: ${LAB_RUNTIME_FRESH_MACRO_TTL_SECONDS:1800}
  chat:
    session:
      key-prefix: ${LAB_CHAT_SESSION_KEY_PREFIX:lab:chat:session:}
      max-messages: ${LAB_CHAT_SESSION_MAX_MESSAGES:20}
      ttl-seconds: ${LAB_CHAT_SESSION_TTL_SECONDS:3600}
  cost:
    price-per-1k-tokens:
      chat: ${LAB_CHAT_CHAT_PRICE_PER_1K_TOKENS:0}
      embedding: ${LAB_CHAT_EMBEDDING_PRICE_PER_1K_TOKENS:0}
  external:
    post:
      endpoints:
        weather:
          base-url: http://127.0.0.1:8080
          path: /mock/weather
        demo-echo:
          base-url: http://127.0.0.1:8080
          path:  /mock/demo-echo
        user-query:
          base-url: http://127.0.0.1:8080
          path: /api/users/username-query
        vector-search:
          base-url: http://127.0.0.1:8080
          path: /api/vector/search

