<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金渐成助手</title>
    <style>
        :root {
            --bg: #f7f5f1;
            --panel: rgba(255, 255, 255, 0.92);
            --panel-strong: #ffffff;
            --line: #e8e1d8;
            --ink: #1c1a17;
            --muted: #7b736b;
            --brand: #0f172a;
            --brand-soft: #f1ece3;
            --accent: #b8693d;
            --accent-soft: #fbefe7;
            --shadow: 0 24px 60px rgba(24, 21, 17, 0.08);
            --sans: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            --mono: "Consolas", "Menlo", monospace;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            margin: 0;
            font-family: var(--sans);
            color: var(--ink);
            background:
                radial-gradient(circle at top left, rgba(184, 105, 61, 0.08), transparent 24%),
                radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.05), transparent 28%),
                linear-gradient(180deg, #fcfbf8 0%, #f7f5f1 100%);
        }

        .app {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 260px 1fr;
        }

        .sidebar {
            padding: 18px 14px;
            background: rgba(252, 251, 248, 0.84);
            backdrop-filter: blur(14px);
            border-right: 1px solid var(--line);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 4px;
        }

        .brand-mark {
            width: 38px;
            height: 38px;
            display: grid;
            place-items: center;
            border-radius: 12px;
            background: linear-gradient(135deg, #111827, #334155);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 14px 26px rgba(15, 23, 42, 0.18);
        }

        .brand-copy strong {
            display: block;
            font-size: 17px;
        }

        .brand-copy span {
            display: block;
            margin-top: 2px;
            font-size: 12px;
            color: var(--muted);
        }

        .btn {
            border: 0;
            border-radius: 16px;
            padding: 12px 14px;
            font: inherit;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(135deg, #111827, #293548);
            box-shadow: 0 14px 30px rgba(15, 23, 42, 0.18);
        }

        .btn-primary:hover,
        .btn-secondary:hover,
        .card:hover {
            transform: translateY(-1px);
        }

        .btn-secondary {
            color: var(--ink);
            background: var(--panel);
            border: 1px solid var(--line);
        }

        .sidebar-section h2 {
            margin: 0 0 10px;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .session-list {
            display: grid;
            gap: 8px;
        }

        .session-item {
            padding: 12px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.72);
            color: #453f39;
            font-size: 13px;
            line-height: 1.45;
        }

        .session-item.active {
            background: var(--brand-soft);
            border-color: #ddd1c4;
        }

        .main {
            min-width: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
        }

        .topbar {
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid rgba(232, 225, 216, 0.78);
            background: rgba(252, 251, 248, 0.8);
            backdrop-filter: blur(18px);
        }

        .topbar-title strong {
            display: block;
            font-size: 15px;
        }

        .topbar-title span {
            display: block;
            margin-top: 2px;
            font-size: 12px;
            color: var(--muted);
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ghost-link {
            border: 0;
            padding: 8px 12px;
            border-radius: 999px;
            background: transparent;
            color: var(--muted);
            font: inherit;
            cursor: pointer;
        }

        .workspace {
            min-height: 0;
            position: relative;
            padding: 0 24px;
        }

        .hero,
        .chat-shell {
            max-width: 980px;
            margin: 0 auto;
        }

        .hero {
            min-height: 100%;
            display: grid;
            align-content: center;
            justify-items: center;
            gap: 28px;
            padding: 40px 0 24px;
            text-align: center;
        }

        .hero-copy h1 {
            margin: 0;
            font-size: clamp(34px, 6vw, 54px);
            line-height: 1.08;
            letter-spacing: -0.03em;
        }

        .hero-copy p {
            max-width: 680px;
            margin: 14px auto 0;
            color: var(--muted);
            font-size: 16px;
            line-height: 1.65;
        }

        .card-grid {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .card {
            width: 100%;
            text-align: left;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: var(--panel-strong);
            box-shadow: var(--shadow);
            padding: 18px;
            cursor: pointer;
            transition: transform 0.16s ease, border-color 0.16s ease;
        }

        .card strong {
            display: block;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .card p {
            margin: 0;
            color: #4d453e;
            font-size: 14px;
            line-height: 1.55;
        }

        .card span {
            display: block;
            margin-top: 10px;
            color: var(--muted);
            font-size: 12px;
        }

        .chat-shell {
            min-height: 100%;
            display: none;
            grid-template-rows: minmax(0, 1fr);
        }

        .chat-shell.active {
            display: grid;
        }

        .chat-stream {
            min-height: 0;
            overflow: auto;
            padding: 26px 0 18px;
            display: grid;
            gap: 18px;
            align-content: start;
        }

        .message-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .message-row.user {
            justify-content: flex-end;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            flex: 0 0 auto;
            background: #ece7df;
            color: var(--brand);
            font-size: 14px;
            font-weight: 700;
        }

        .message-row.user .avatar {
            order: 2;
            background: var(--brand);
            color: #fff;
        }

        .bubble-wrap {
            max-width: min(780px, 80%);
            display: grid;
            gap: 6px;
        }

        .message-row.user .bubble-wrap {
            justify-items: end;
        }

        .bubble {
            border-radius: 22px;
            border: 1px solid var(--line);
            background: var(--panel-strong);
            padding: 16px 18px;
            box-shadow: var(--shadow);
            line-height: 1.7;
            font-size: 15px;
            overflow-wrap: break-word;
        }

        .message-row.user .bubble {
            color: #fff;
            background: linear-gradient(135deg, #111827, #2b3544);
            border-color: transparent;
        }

        .meta {
            font-size: 12px;
            color: var(--muted);
        }

        .md h1, .md h2, .md h3 {
            margin: 10px 0 8px;
            line-height: 1.3;
        }

        .md p { margin: 0 0 8px; }
        .md ul { margin: 0 0 8px 20px; padding: 0; }
        .md li { margin-bottom: 4px; }
        .md code {
            padding: 1px 5px;
            border-radius: 6px;
            background: #f4efe8;
            font-family: var(--mono);
            font-size: 13px;
        }

        .message-row.user .md code {
            background: rgba(255, 255, 255, 0.16);
            color: #fff;
        }

        .md pre {
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
            background: #f4efe8;
            overflow: auto;
        }

        .composer-shell {
            position: sticky;
            bottom: 0;
            padding: 16px 24px 22px;
            background:
                linear-gradient(180deg, rgba(247, 245, 241, 0) 0%, rgba(247, 245, 241, 0.9) 22%, rgba(247, 245, 241, 0.98) 100%);
        }

        .composer {
            max-width: 980px;
            margin: 0 auto;
            padding: 14px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: end;
            border: 1px solid var(--line);
            border-radius: 26px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: var(--shadow);
        }

        .composer-main {
            display: grid;
            gap: 10px;
        }

        .composer-main textarea {
            width: 100%;
            min-height: 74px;
            max-height: 220px;
            resize: vertical;
            border: 0;
            padding: 4px 6px;
            outline: none;
            background: transparent;
            color: var(--ink);
            font: inherit;
            line-height: 1.6;
        }

        .composer-foot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 0 6px;
        }

        .helper-text {
            color: var(--muted);
            font-size: 12px;
        }

        .send-col {
            display: grid;
            gap: 8px;
            justify-items: end;
        }

        .quick-panel {
            position: absolute;
            top: 76px;
            right: 24px;
            width: min(360px, calc(100% - 48px));
            padding: 14px;
            border: 1px solid var(--line);
            border-radius: 22px;
            background: rgba(255, 255, 255, 0.97);
            box-shadow: var(--shadow);
            display: none;
        }

        .quick-panel.open {
            display: grid;
            gap: 10px;
        }

        .quick-panel h2 {
            margin: 0;
            font-size: 16px;
        }

        .quick-panel p {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .quick-list {
            display: grid;
            gap: 10px;
        }

        .quick-item {
            width: 100%;
            padding: 12px 14px;
            text-align: left;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: #fff;
            cursor: pointer;
        }

        .quick-item strong {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .quick-item span {
            color: var(--muted);
            font-size: 12px;
        }

        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.76);
            color: #4d453e;
            font-size: 12px;
        }

        .status-chip.running {
            background: var(--accent-soft);
            color: #8e4a25;
            border-color: #ebc9b5;
        }

        .status-chip.failed {
            color: #a13434;
            background: #fff1f1;
            border-color: #f1c0c0;
        }

        .empty-note {
            color: var(--muted);
            font-size: 14px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 1100px) {
            .app {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }
        }

        @media (max-width: 760px) {
            .workspace,
            .topbar,
            .composer-shell {
                padding-left: 14px;
                padding-right: 14px;
            }

            .card-grid {
                grid-template-columns: 1fr;
            }

            .composer {
                grid-template-columns: 1fr;
            }

            .send-col {
                justify-items: stretch;
            }

            .send-col .btn {
                width: 100%;
            }

            .composer-foot {
                flex-direction: column;
                align-items: flex-start;
            }

            .bubble-wrap {
                max-width: 92%;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">金</div>
            <div class="brand-copy">
                <strong>金渐成助手</strong>
                <span>用长期框架聊投资与选择</span>
            </div>
        </div>
        <button id="newSessionBtn" class="btn btn-primary">新建对话</button>
        <div class="sidebar-section">
            <h2>最近对话</h2>
            <div class="session-list">
                <div class="session-item active">英伟达现在是高估还是低估？</div>
                <div class="session-item">作者在 2025 年怎么判断微软？</div>
                <div class="session-item">仓位该怎么从进攻转向防守？</div>
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="topbar-title">
                <strong id="topbarHeading">首页</strong>
                <span id="topbarSubtitle">从推荐问题开始，也可以直接输入你的问题。</span>
            </div>
            <div class="topbar-actions">
                <span id="statusChip" class="status-chip">就绪</span>
                <button id="quickToggleBtn" class="ghost-link hidden">推荐问题</button>
            </div>
        </header>

        <section class="workspace">
            <section id="heroView" class="hero">
                <div class="hero-copy">
                    <h1 id="heroTitle">今天想聊点什么？</h1>
                    <p id="heroSubtitle">可以问估值、历史观点、仓位配置，或直接输入股票代码。</p>
                </div>
                <div id="recommendationGrid" class="card-grid"></div>
            </section>

            <section id="chatView" class="chat-shell">
                <div id="chatStream" class="chat-stream"></div>
            </section>

            <aside id="quickPanel" class="quick-panel">
                <h2>推荐问题</h2>
                <p>点一下就能填入输入框，你也可以改成更具体的问题。</p>
                <div id="quickList" class="quick-list"></div>
            </aside>
        </section>

        <div class="composer-shell">
            <div class="composer">
                <div class="composer-main">
                    <textarea id="messageInput" placeholder="给我一个问题，我来按金渐成视角帮你拆解。"></textarea>
                    <div class="composer-foot">
                        <span class="helper-text">推荐卡片来自服务端；按 Ctrl + Enter 发送</span>
                        <span id="conversationHint" class="helper-text">当前会话：jinjian-web-1</span>
                    </div>
                </div>
                <div class="send-col">
                    <button id="sendBtn" class="btn btn-primary">发送</button>
                    <button id="fillExampleBtn" class="btn btn-secondary">填入示例</button>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const fallbackRecommendations = {
        title: "今天想聊点什么？",
        subtitle: "从下面的推荐问题开始，也可以直接输入你的问题。",
        cards: [
            { id: "valuation", title: "估值判断", prompt: "现在 NVDA 是高估还是低估？", description: "按实时数据和估值框架拆解。" },
            { id: "historical-view", title: "历史观点", prompt: "作者在 2025 年是怎么判断微软的？", description: "回到历史文章里找原始观点。" },
            { id: "position-sizing", title: "仓位节奏", prompt: "现在适合分批加仓，还是先控制回撤？", description: "用 2-3-3-2 的节奏来判断。" },
            { id: "asset-allocation", title: "资产配置", prompt: "我的仓位该怎么从进攻转向防守？", description: "围绕进攻、稳健、防守来重排。" }
        ]
    };

    const dom = {
        heroView: document.getElementById("heroView"),
        chatView: document.getElementById("chatView"),
        heroTitle: document.getElementById("heroTitle"),
        heroSubtitle: document.getElementById("heroSubtitle"),
        topbarHeading: document.getElementById("topbarHeading"),
        topbarSubtitle: document.getElementById("topbarSubtitle"),
        recommendationGrid: document.getElementById("recommendationGrid"),
        quickList: document.getElementById("quickList"),
        quickToggleBtn: document.getElementById("quickToggleBtn"),
        quickPanel: document.getElementById("quickPanel"),
        messageInput: document.getElementById("messageInput"),
        sendBtn: document.getElementById("sendBtn"),
        fillExampleBtn: document.getElementById("fillExampleBtn"),
        newSessionBtn: document.getElementById("newSessionBtn"),
        chatStream: document.getElementById("chatStream"),
        statusChip: document.getElementById("statusChip"),
        conversationHint: document.getElementById("conversationHint")
    };

    const state = {
        conversationId: "jinjian-web-1",
        running: false,
        view: "home",
        recommendations: fallbackRecommendations,
        messages: [],
        pendingAnswer: "",
        currentAssistantBubble: null,
        quickPanelOpen: false
    };

    function escapeHtml(value) {
        return String(value || "")
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll("\"", "&quot;")
            .replaceAll("'", "&#39;");
    }

    function formatMarkdown(text) {
        const lines = escapeHtml(text || "").split("\n");
        const html = [];
        let inList = false;
        let inCode = false;

        for (const line of lines) {
            if (line.startsWith("```")) {
                html.push(inCode ? "</code></pre>" : "<pre><code>");
                inCode = !inCode;
                continue;
            }

            if (inCode) {
                html.push(line + "\n");
                continue;
            }

            if (line.startsWith("### ")) {
                if (inList) { html.push("</ul>"); inList = false; }
                html.push("<h3>" + line.slice(4) + "</h3>");
                continue;
            }

            if (line.startsWith("## ")) {
                if (inList) { html.push("</ul>"); inList = false; }
                html.push("<h2>" + line.slice(3) + "</h2>");
                continue;
            }

            if (line.startsWith("# ")) {
                if (inList) { html.push("</ul>"); inList = false; }
                html.push("<h1>" + line.slice(2) + "</h1>");
                continue;
            }

            if (line.startsWith("- ")) {
                if (!inList) { html.push("<ul>"); inList = true; }
                html.push("<li>" + line.slice(2) + "</li>");
                continue;
            }

            if (inList) { html.push("</ul>"); inList = false; }
            html.push(line.trim() ? "<p>" + line + "</p>" : "<p></p>");
        }

        if (inList) html.push("</ul>");
        return html.join("").replace(/`([^`]+)`/g, "<code>$1</code>");
    }

    function syncShell() {
        const isHome = state.view === "home";
        dom.heroView.classList.toggle("hidden", !isHome);
        dom.chatView.classList.toggle("active", !isHome);
        dom.quickToggleBtn.classList.toggle("hidden", isHome);
        dom.quickPanel.classList.toggle("open", state.quickPanelOpen && !isHome);
        dom.topbarHeading.textContent = isHome ? "首页" : "当前对话";
        dom.topbarSubtitle.textContent = isHome
            ? "从推荐问题开始，也可以直接输入你的问题。"
            : "如果想换个方向，可以打开右上角的推荐问题。";
        dom.conversationHint.textContent = "当前会话：" + state.conversationId;
    }

    function setStatus(text, type) {
        dom.statusChip.textContent = text;
        dom.statusChip.className = "status-chip";
        if (type) {
            dom.statusChip.classList.add(type);
        }
    }

    function addMessage(role, html, metaText) {
        const row = document.createElement("div");
        row.className = "message-row " + role;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "我" : "金";

        const wrap = document.createElement("div");
        wrap.className = "bubble-wrap";

        const bubble = document.createElement("div");
        bubble.className = "bubble md";
        bubble.innerHTML = html;
        wrap.appendChild(bubble);

        if (metaText) {
            const meta = document.createElement("div");
            meta.className = "meta";
            meta.textContent = metaText;
            wrap.appendChild(meta);
        }

        row.appendChild(avatar);
        row.appendChild(wrap);
        dom.chatStream.appendChild(row);
        dom.chatStream.scrollTop = dom.chatStream.scrollHeight;
        return bubble;
    }

    function resetConversation() {
        state.conversationId = "jinjian-web-" + Date.now();
        state.view = "home";
        state.running = false;
        state.pendingAnswer = "";
        state.currentAssistantBubble = null;
        state.quickPanelOpen = false;
        state.messages = [];
        dom.chatStream.innerHTML = "";
        dom.messageInput.value = "";
        dom.sendBtn.disabled = false;
        setStatus("就绪");
        syncShell();
    }

    function choosePrompt(prompt) {
        dom.messageInput.value = prompt || "";
        dom.messageInput.focus();
        state.quickPanelOpen = false;
        syncShell();
    }

    function renderCards(cards) {
        const safeCards = Array.isArray(cards) && cards.length > 0 ? cards : fallbackRecommendations.cards;
        dom.recommendationGrid.innerHTML = "";
        dom.quickList.innerHTML = "";

        for (const card of safeCards) {
            const homeCard = document.createElement("button");
            homeCard.className = "card";
            homeCard.type = "button";
            homeCard.innerHTML =
                "<strong>" + escapeHtml(card.title) + "</strong>" +
                "<p>" + escapeHtml(card.prompt) + "</p>" +
                "<span>" + escapeHtml(card.description || "") + "</span>";
            homeCard.addEventListener("click", function () {
                choosePrompt(card.prompt);
            });
            dom.recommendationGrid.appendChild(homeCard);

            const quickCard = document.createElement("button");
            quickCard.className = "quick-item";
            quickCard.type = "button";
            quickCard.innerHTML =
                "<strong>" + escapeHtml(card.title) + "</strong>" +
                "<span>" + escapeHtml(card.prompt) + "</span>";
            quickCard.addEventListener("click", function () {
                choosePrompt(card.prompt);
            });
            dom.quickList.appendChild(quickCard);
        }
    }

    async function loadRecommendations() {
        try {
            const response = await fetch("/home/recommendations");
            if (!response.ok) {
                throw new Error("HTTP " + response.status);
            }
            const payload = await response.json();
            state.recommendations = {
                title: payload.title || fallbackRecommendations.title,
                subtitle: payload.subtitle || fallbackRecommendations.subtitle,
                cards: Array.isArray(payload.cards) && payload.cards.length > 0 ? payload.cards : fallbackRecommendations.cards
            };
        } catch (error) {
            state.recommendations = fallbackRecommendations;
        }

        dom.heroTitle.textContent = state.recommendations.title;
        dom.heroSubtitle.textContent = state.recommendations.subtitle;
        renderCards(state.recommendations.cards);
    }

    function parseSseBlocks(buffer) {
        const normalized = buffer.replace(/\r\n/g, "\n");
        const chunks = normalized.split("\n\n");
        const completeBlocks = chunks.slice(0, -1);
        const rest = chunks[chunks.length - 1] || "";
        const events = [];

        for (const block of completeBlocks) {
            if (!block.trim()) continue;
            const lines = block.split("\n");
            let eventName = "";
            const dataLines = [];

            for (const line of lines) {
                if (line.startsWith("event:")) {
                    eventName = line.slice(6).trim();
                } else if (line.startsWith("data:")) {
                    dataLines.push(line.slice(5).trim());
                }
            }

            events.push({
                eventName: eventName || "message",
                rawData: dataLines.join("\n")
            });
        }
        return { events, rest };
    }

    function parseEnvelope(eventName, rawData) {
        try {
            const payload = JSON.parse(rawData);
            return { event: eventName || payload.type || "unknown", payload: payload };
        } catch (error) {
            return { event: eventName || "unknown", payload: { content: rawData } };
        }
    }

    function applyEvent(envelope) {
        const name = envelope.event;
        const payload = envelope.payload || {};

        if (name === "answer_chunk") {
            state.pendingAnswer += payload.content || "";
            if (!state.currentAssistantBubble) {
                state.currentAssistantBubble = addMessage("assistant", "<p class='empty-note'>正在生成回答…</p>", "");
            }
            state.currentAssistantBubble.innerHTML = formatMarkdown(state.pendingAnswer);
            dom.chatStream.scrollTop = dom.chatStream.scrollHeight;
            return;
        }

        if (name === "done") {
            state.running = false;
            state.currentAssistantBubble = null;
            dom.sendBtn.disabled = false;
            setStatus("已完成");
            return;
        }

        if (name === "error") {
            state.running = false;
            state.currentAssistantBubble = null;
            dom.sendBtn.disabled = false;
            setStatus("请求失败", "failed");
            addMessage("assistant", "<p>这次请求失败了，请稍后再试。</p>", "");
        }
    }

    async function runStream() {
        if (state.running) {
            return;
        }

        const message = dom.messageInput.value.trim();
        if (!message) {
            return;
        }

        if (state.view === "home") {
            state.view = "chat";
            syncShell();
        }

        addMessage("user", formatMarkdown(message), new Date().toLocaleTimeString());
        dom.messageInput.value = "";
        state.running = true;
        state.pendingAnswer = "";
        state.currentAssistantBubble = null;
        state.quickPanelOpen = false;
        dom.sendBtn.disabled = true;
        setStatus("生成中", "running");
        syncShell();

        try {
            const response = await fetch("/chat/stream", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    conversationId: state.conversationId,
                    message: message
                })
            });

            if (!response.ok || !response.body) {
                throw new Error("HTTP " + response.status);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";

            while (true) {
                const chunk = await reader.read();
                if (chunk.done) break;
                buffer += decoder.decode(chunk.value, { stream: true });
                const parsed = parseSseBlocks(buffer);
                buffer = parsed.rest;
                for (const item of parsed.events) {
                    applyEvent(parseEnvelope(item.eventName, item.rawData));
                }
            }

            if (buffer.trim()) {
                const parsed = parseSseBlocks(buffer + "\n\n");
                for (const item of parsed.events) {
                    applyEvent(parseEnvelope(item.eventName, item.rawData));
                }
            }

            if (state.running) {
                state.running = false;
                state.currentAssistantBubble = null;
                dom.sendBtn.disabled = false;
                setStatus("已完成");
            }
        } catch (error) {
            state.running = false;
            state.currentAssistantBubble = null;
            dom.sendBtn.disabled = false;
            setStatus("请求失败", "failed");
            addMessage("assistant", "<p>暂时没连上服务，请稍后再试。</p>", "");
        }
    }

    dom.sendBtn.addEventListener("click", runStream);

    dom.messageInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && (event.ctrlKey || event.metaKey)) {
            event.preventDefault();
            runStream();
        }
    });

    dom.fillExampleBtn.addEventListener("click", function () {
        const firstCard = state.recommendations.cards && state.recommendations.cards[0];
        choosePrompt(firstCard ? firstCard.prompt : fallbackRecommendations.cards[0].prompt);
    });

    dom.newSessionBtn.addEventListener("click", resetConversation);

    dom.quickToggleBtn.addEventListener("click", function () {
        state.quickPanelOpen = !state.quickPanelOpen;
        syncShell();
    });

    document.addEventListener("click", function (event) {
        const target = event.target;
        if (!(target instanceof HTMLElement)) {
            return;
        }
        if (dom.quickPanel.contains(target) || dom.quickToggleBtn.contains(target)) {
            return;
        }
        if (state.quickPanelOpen) {
            state.quickPanelOpen = false;
            syncShell();
        }
    });

    (function init() {
        syncShell();
        loadRecommendations();
    })();
</script>
</body>
</html>
